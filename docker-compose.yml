services:

  backend:
    build: ./backend
    container_name: decision2026-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: decision2026-frontend

  nginx:
    image: nginx:alpine
    container_name: decision2026-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend